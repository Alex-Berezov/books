name: 📦 Production Deployment

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v2.1.3, etc.
    branches:
      - main # Auto-deploy from main branch (optional)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (tag, branch, or commit)'
        required: true
        default: 'main'
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        required: false
        type: boolean
        default: false
      skip_backup_emergency:
        description: 'Skip pre-deploy backup (emergency only!)'
        required: false
        type: boolean
        default: false

# Global workflow permissions
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: books-app
  DEPLOY_USER: deploy

jobs:
  # =====================================================
  # TESTING AND QUALITY CHECKS
  # =====================================================

  test:
    name: 🧪 Tests & Quality Checks
    runs-on: ubuntu-22.04
    if: ${{ !github.event.inputs.skip_tests }}

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: books_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # For semantic versioning

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: 🔧 Install Dependencies
        run: |
          yarn --frozen-lockfile
          yarn prisma generate

      - name: 📋 Lint & Type Check
        run: |
          yarn lint
          yarn typecheck

      - name: 🧪 Unit Tests
        run: yarn test
        env:
          NODE_ENV: test

      - name: 🔧 Setup Test Database
        run: |
          yarn prisma migrate deploy
          yarn prisma db seed
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/books_test?schema=public

      - name: 🧪 E2E Tests
        run: yarn test:e2e:serial
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/books_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # =====================================================
  # DOCKER IMAGE BUILD
  # =====================================================

  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-22.04
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || github.event.inputs.skip_tests) }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⬇️ Normalize repository to lowercase
        # Some actions/registries require lowercase image names. Persist as REPO_LOWER for later steps.
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 🔍 Extract Version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="main-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: 🔑 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix={{branch}}-
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.run_id }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Generate SBOM
        uses: anchore/sbom-action@v0
        continue-on-error: true # Don't block deployment on SBOM errors
        with:
          image: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ steps.version.outputs.version }}
          artifact-name: sbom-${{ steps.version.outputs.version }}.spdx.json
          output-file: ./sbom-${{ steps.version.outputs.version }}.spdx.json

      - name: 🔍 Security Scan
        uses: anchore/scan-action@v3
        continue-on-error: true # Don't block deployment on scan errors
        with:
          image: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ steps.version.outputs.version }}
          fail-build: false # Don't stop deployment on medium vulnerabilities

  # =====================================================
  # PRODUCTION DEPLOYMENT
  # =====================================================

  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-22.04
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ vars.PRODUCTION_DOMAIN }}

    steps:
      - name: 📥 Checkout Deployment Scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/deploy_production.sh
            scripts/health_check.sh
            docker-compose.prod.yml
            .env.prod.template
          sparse-checkout-cone-mode: false

      - name: 🔑 Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: 📋 Prepare Deployment
        run: |
          echo "🔧 Deployment configuration:"
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Server: ${{ vars.PRODUCTION_SERVER }}"
          echo "Domain: ${{ vars.PRODUCTION_DOMAIN }}"

      - name: 🚀 Deploy to Server
        run: |
          # Lowercase repository name for Docker
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Connect to server and execute deployment
          ssh -o StrictHostKeyChecking=no ${{ env.DEPLOY_USER }}@${{ vars.PRODUCTION_SERVER }} << EOF
            set -euo pipefail
            
            echo "🔄 Preparing deployment environment..."
            cd /opt/books/app/src
            
            # Save local changes and update code
            if [[ -d ".git" ]]; then
              echo "📦 Stashing local changes..."
              git stash --include-untracked || true
              
              echo "🔄 Fetching latest code..."
              git fetch origin main
              
              echo "🔄 Updating to latest version..."
              git reset --hard origin/main
              
              echo "✅ Code updated successfully"
              chmod +x scripts/deploy_production.sh
            fi
            
            # Create .env.prod from secrets
            echo "📝 Creating .env.prod from secrets..."
            cat > .env.prod << 'ENVEOF'
          ${{ secrets.ENV_PROD }}
          ENVEOF
            chmod 600 .env.prod
            echo "✅ .env.prod created successfully"
            
            # Login to registry to pull image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            BACKUP_FLAG=""
            if [[ "${{ github.event.inputs.skip_backup_emergency }}" == "true" ]]; then
              echo "⚠️  EMERGENCY: Skipping pre-deploy backup!"
              BACKUP_FLAG="--no-backup"
            fi
            
            echo "🚀 Starting deployment..."
            ./scripts/deploy_production.sh \
              --image-tag "${{ needs.build.outputs.version }}" \
              --registry "${{ env.REGISTRY }}/${REPO_LOWER}" \
              --skip-git-update \
              --pull \
              $BACKUP_FLAG \
              --force
            
            echo "✅ Deployment completed!"
          EOF

      - name: 🏥 Health Check
        run: |
          echo "🏥 Running post-deployment health checks..."

          # Wait for service readiness
          max_attempts=20
          attempt=0

          while [[ $attempt -lt $max_attempts ]]; do
            if curl -sf "https://${{ vars.PRODUCTION_DOMAIN }}/api/health/liveness"; then
              echo "✅ Service is healthy!"
              break
            fi
            
            ((attempt++))
            echo "⏳ Attempt $attempt/$max_attempts..."
            sleep 15
          done

          if [[ $attempt -eq $max_attempts ]]; then
            echo "❌ Health check failed after $max_attempts attempts"
            exit 1
          fi

      - name: 📊 Verify Deployment
        run: |
          echo "📊 Verifying deployment..."

          # Check API version
          api_response=$(curl -sf "https://${{ vars.PRODUCTION_DOMAIN }}/api/health/liveness")
          api_version=$(echo "$api_response" | jq -r '.version // "unknown"')

          echo "🔍 API Version: $api_version"
          echo "🎯 Expected Version: ${{ needs.build.outputs.version }}"

          # Check main endpoints
          endpoints=(
            "/api/health/readiness"
            "/api/metrics"
          )

          for endpoint in "${endpoints[@]}"; do
            if curl -sf "https://${{ vars.PRODUCTION_DOMAIN }}$endpoint" > /dev/null; then
              echo "✅ $endpoint - OK"
            else
              echo "❌ $endpoint - FAILED"
              exit 1
            fi
          done

          echo "✅ All verifications passed!"

  # =====================================================
  # NOTIFICATIONS
  # =====================================================

  notify:
    name: 📢 Notifications
    runs-on: ubuntu-22.04
    needs: [build, deploy]
    if: always()

    steps:
      - name: 📢 Notify Success
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          echo "🎉 Deployment successful!"
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "URL: https://${{ vars.PRODUCTION_DOMAIN }}"

          # Here you can add integrations with:
          # - Slack (webhook)
          # - Discord
          # - Telegram
          # - Email

      - name: 🚨 Notify Failure
        if: ${{ needs.deploy.result == 'failure' }}
        run: |
          echo "❌ Deployment failed!"
          echo "Version: ${{ needs.build.outputs.version }}"
          echo "Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # =====================================================
  # ROLLBACK (Manual trigger)
  # =====================================================

  rollback:
    name: ⏪ Emergency Rollback
    runs-on: ubuntu-22.04
    if: failure() && github.event_name == 'workflow_dispatch'
    environment:
      name: production

    steps:
      - name: 🔑 Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: ⏪ Rollback Deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.DEPLOY_USER }}@${{ vars.PRODUCTION_SERVER }} << 'EOF'
            set -euo pipefail
            
            echo "⏪ Starting emergency rollback..."
            cd /opt/books/app
            
            if [[ -f "./scripts/deploy_production.sh" ]]; then
              ./scripts/deploy_production.sh --rollback --force
              echo "✅ Rollback completed!"
            else
              echo "❌ Rollback script not found!"
              exit 1
            fi
          EOF
